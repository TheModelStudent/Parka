  var fmt=function(v){return "₹"+v.toLocaleString('en-IN');};
  var state={cat:"all",q:"",sort:"newest"};
  var cats=["all"].concat(Array.from(new Set(P.map(function(p){return p.c;}))));
  var chips=document.getElementById('chips');
  chips.innerHTML=cats.map(function(c){return '<button class="chip'+(c==='all'?' active':'')+'" data-c="'+c+'">'+(c==='all'?'All':c)+'</button>';}).join('');
  chips.addEventListener('click',function(e){var b=e.target.closest('.chip');if(!b)return;state.cat=b.dataset.c;
    chips.querySelectorAll('.chip').forEach(function(x){x.classList.toggle('active',x.dataset.c===state.cat);});render();});
  document.getElementById('q').addEventListener('input',function(e){state.q=e.target.value.toLowerCase();render();});
  document.getElementById('sort').addEventListener('change',function(e){state.sort=e.target.value;render();});

  function render(){
    var list=P.slice();
    if(state.cat!=='all') list=list.filter(function(p){return p.c===state.cat;});
    if(state.q) list=list.filter(function(p){return (p.n+' '+p.s+' '+p.m+' '+p.c).toLowerCase().indexOf(state.q)>-1;});
    if(state.sort==='price-asc') list.sort(function(a,b){return a.p-b.p;});
    else if(state.sort==='price-desc') list.sort(function(a,b){return b.p-a.p;});
    else if(state.sort==='name') list.sort(function(a,b){return a.n.localeCompare(b.n);});
    else list.sort(function(a,b){return b.r-a.r;});
    var g=document.getElementById('grid');
    g.innerHTML=list.map(function(p){
      return '<a class="card" href="#" style="flex:none"><div class="imgbox">'+(p.b?'<span class="badge">'+p.b+'</span>':'')+
        '<img loading="lazy" src="public/images/catalog/'+p.img+'.jpg" alt="'+p.n+'"/></div><div class="cap"><h3>'+p.n+
        '</h3><div class="sub">'+p.s+'</div><div class="price">'+fmt(p.p)+'</div></div></a>';
    }).join('');
    document.getElementById('count').textContent=list.length+(list.length===1?' piece':' pieces');
    document.getElementById('empty').style.display=list.length?'none':'block';
  }
